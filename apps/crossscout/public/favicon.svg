<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="ssvGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#0094CC"/>
        </linearGradient>
        <linearGradient id="etGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#A855F7"/><stop offset="100%" stop-color="#6D28D9"/>
        </linearGradient>
        <linearGradient id="bridgeGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#A855F7"/>
        </linearGradient>
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="ambientGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="18" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id="leftSide"><rect x="0" y="0" width="244" height="512"/></clipPath>
        <clipPath id="rightSide"><rect x="268" y="0" width="244" height="512"/></clipPath>
    </defs>
    <rect width="512" height="512" rx="100" fill="#07091A"/>
    <rect width="512" height="512" rx="100" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <polygon points="256,76 112,256 256,436" fill="url(#ssvGrad)" clip-path="url(#leftSide)" filter="url(#ambientGlow)" opacity="0.95"/>
    <polygon points="256,76 400,256 256,436" fill="url(#etGrad)" clip-path="url(#rightSide)" filter="url(#ambientGlow)" opacity="0.95"/>
    <polygon points="244,256 112,256 244,436" fill="#005F99" clip-path="url(#leftSide)" opacity="0.55"/>
    <polygon points="268,256 400,256 268,436" fill="#4C1D95" clip-path="url(#rightSide)" opacity="0.55"/>
    <rect x="208" y="245" width="50" height="22" rx="11" fill="url(#bridgeGrad)" opacity="0.9"/>
    <rect x="254" y="245" width="50" height="22" rx="11" fill="url(#bridgeGrad)" opacity="0.9"/>
    <rect x="246" y="249" width="20" height="14" rx="7" fill="#07091A" opacity="0.85"/>
    <circle cx="256" cy="256" r="26" fill="white" opacity="0.08"/>
    <circle cx="256" cy="256" r="14" fill="none" stroke="url(#bridgeGrad)" stroke-width="3" filter="url(#glow)"/>
    <circle cx="256" cy="256" r="6" fill="white" opacity="0.92"/>
</svg>
