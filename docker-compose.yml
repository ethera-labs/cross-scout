# Local development dependencies for the CrossScout indexer.
# The indexer itself and the api run on the host (cargo run / bun run);
# this only brings up the datastores.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crossscout
      POSTGRES_PASSWORD: crossscout
      POSTGRES_DB: crossscout
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crossscout"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  pgdata:
  redisdata:
  chdata:
